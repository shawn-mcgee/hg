<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
  </head>
  <body>
    <script src="./hg.js"></script>
    <script type="module">

      hg.setup({
        w: 64,
        h: 64,
        si: 1,
        vbg: "black",
      })


      
      const assets = [
        hg.image("./kenney.png", "kenney")
      ]

      await hg.loadAll(...assets)

      const tiles = hg.Atlas.from("kenney", 22, 49)



      const scene = hg.Scene.new({
        onRender(c) {
          for(let x = 0; x < 64; x += 16)
            for(let y = 0; y < 64; y += 16)
              hg.Atlas.draw(c, tiles, 1, {x, y})
        }
      })

      hg.cue(scene)

      
    </script>
  </body>
</html>
