<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
  </head>
  <body>
    <script src="./hg.js"></script>
    <script>
      const stage = hg.Stage.new({w: 256, h: 256, fps: 60})

      hg.Stage.setScene(stage, hg.Scene.new({
        onRender({g, dt}) {
          g.fillStyle = "red"
          g.fillRect(0, 0, 10, 10)
        }
      }))
      
    </script>
  </body>
</html>
